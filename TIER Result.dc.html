<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TIER · 결과</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; background: #0B0B0F; color: #fff; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  body { overflow-x: hidden; }
  a { text-decoration: none; color: inherit; }
  button { font-family: inherit; cursor: pointer; }
  @keyframes badge-in { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.06); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes view-in { 0% { transform: translateY(8px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
</style>
</head>
<body>

<div style="min-height: 100vh; width: 100%; background: #0B0B0F; position: relative; overflow: hidden;">
  <div aria-hidden="true" style="position: absolute; inset: 0; pointer-events: none; background: radial-gradient(60% 40% at 50% 0%, rgba(255,31,143,0.10), transparent 70%), linear-gradient(180deg, transparent, rgba(0,0,0,0.6) 80%);"></div>

  <div style="position: relative; max-width: 600px; margin: 0 auto; padding: 0 20px;">
    <section style="padding: 28px 0 80px; animation: view-in 320ms ease both;" id="result-root">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px;">
        <div style="display: inline-flex; align-items: center; gap: 8px; padding: 5px 10px 5px 8px; border-radius: 999px; background: rgba(255,31,143,0.08); border: 1px solid rgba(255,31,143,0.30);">
          <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #FF1F8F; box-shadow: 0 0 8px #FF1F8F;"></span>
          <span style="font-size: 10.5px; font-weight: 900; letter-spacing: 0.22em; color: #FF1F8F;">측정 완료</span>
        </div>
        <a href="./TIER%20Quiz.dc.html" style="font-size: 11.5px; font-weight: 700; color: rgba(255,255,255,0.55);">다시 측정 ↻</a>
      </div>

      <div style="font-size: 10.5px; font-weight: 800; letter-spacing: 0.22em; color: rgba(255,255,255,0.5); margin-bottom: 4px;">외적 점수 합계</div>
      <div style="display: flex; align-items: baseline; gap: 10px; margin-bottom: 22px;">
        <div id="total-score" style="font-size: clamp(48px, 14vw, 72px); font-weight: 900; letter-spacing: -0.04em; line-height: 1; color: #fff;">0</div>
        <div style="font-size: 20px; font-weight: 700; color: rgba(255,255,255,0.4); letter-spacing: -0.02em;">/ 34</div>
      </div>

      <div id="tier-card" style="position: relative; padding: 26px 20px 24px; border-radius: 20px; margin-bottom: 28px; overflow: hidden;">
        <div id="tier-glow" aria-hidden="true" style="position: absolute; inset: 0; pointer-events: none;"></div>
        <div style="position: relative; display: flex; align-items: center; gap: 18px;">
          <div id="tier-badge" style="flex: 0 0 auto; animation: badge-in 700ms cubic-bezier(0.34, 1.56, 0.64, 1) both;"></div>
          <div style="flex: 1; min-width: 0;">
            <div id="tier-grade" style="font-size: 11px; font-weight: 800; letter-spacing: 0.18em; color: rgba(255,255,255,0.6); margin-bottom: 4px;"></div>
            <div id="tier-name" style="font-size: clamp(28px, 7.4vw, 38px); font-weight: 900; letter-spacing: -0.025em; line-height: 1.05; margin-bottom: 6px;"></div>
            <div id="tier-tagline" style="font-size: 12.5px; color: rgba(255,255,255,0.6);"></div>
          </div>
        </div>
      </div>

      <div style="padding: 16px 18px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); margin-bottom: 24px;">
        <div style="font-size: 10.5px; font-weight: 800; letter-spacing: 0.22em; color: rgba(255,255,255,0.55); margin-bottom: 6px;">팩폭 코멘트</div>
        <div id="tier-factbomb" style="font-size: 13.5px; line-height: 1.55; color: rgba(255,255,255,0.85);"></div>
      </div>

      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <div style="font-size: 10.5px; font-weight: 800; letter-spacing: 0.22em; color: rgba(255,255,255,0.85);">외적 · BREAKDOWN</div>
        <div style="height: 1px; flex: 1; background: rgba(255,255,255,0.08);"></div>
        <div id="breakdown-meta" style="font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35);">0 / 34</div>
      </div>
      <div id="breakdown" style="display: grid; gap: 8px;"></div>

      <div style="display: flex; align-items: center; gap: 10px; margin: 28px 0 12px;">
        <div style="font-size: 10.5px; font-weight: 800; letter-spacing: 0.22em; color: rgba(255,255,255,0.85);">내적 · PROFILE</div>
        <div style="height: 1px; flex: 1; background: rgba(255,255,255,0.08);"></div>
        <div style="font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35);">6 traits</div>
      </div>
      <div id="internal-chips" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;"></div>

      <div style="margin-top: 28px; padding: 20px 18px; border-radius: 14px; background: linear-gradient(180deg, rgba(255,31,143,0.08), rgba(255,31,143,0.01)); border: 1px solid rgba(255,31,143,0.28);">
        <div style="font-size: 10.5px; font-weight: 800; letter-spacing: 0.22em; color: #FF1F8F; margin-bottom: 8px;">MATCH POOL</div>
        <div style="font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.85); line-height: 1.5; letter-spacing: -0.01em;">
          같은 계급 + 70% 이상 싱크로 매칭 풀
        </div>
        <div style="display: flex; align-items: baseline; gap: 10px; margin-top: 6px;">
          <div id="match-count" style="font-size: 32px; font-weight: 900; color: #FF1F8F; letter-spacing: -0.03em;">약 0명</div>
          <div style="font-size: 12px; color: rgba(255,255,255,0.45);">지금 매칭 대기 중</div>
        </div>
      </div>

      <div style="display: grid; gap: 10px; margin-top: 24px;">
        <a href="./TIER%20Quiz.dc.html" style="width: 100%; padding: 18px 22px; border-radius: 14px; background: #FF1F8F; color: #0B0B0F; font-size: 16px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 8px; letter-spacing: -0.01em;">
          매칭 풀 입장 신청 →
        </a>
        <a href="./TIER%20Landing.dc.html" style="width: 100%; padding: 14px 22px; border-radius: 14px; background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.10); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center;">
          처음으로 ↩
        </a>
      </div>

      <div style="margin-top: 14px; text-align: center; font-size: 10.5px; color: rgba(255,255,255,0.30); line-height: 1.6; letter-spacing: 0.02em;">
        본 결과는 데모입니다. 실서비스에선 인증/검증 단계를 거쳐 산정됩니다.
      </div>
    </section>
  </div>
</div>

<script>
(function () {
  const META = [
    { num: '01', label: 'WEALTH', maxScore: 6 },
    { num: '02', label: 'LOOKS', maxScore: 6 },
    { num: '03', label: 'EDU', maxScore: 6 },
    { num: '04', label: 'LOC', maxScore: 5 },
    { num: '05', label: 'CARE', maxScore: 5 },
    { num: '06', label: 'REP', maxScore: 6 },
    { num: '07', label: 'MARRIAGE', metaByValue: { A: '결혼 급함', B: '신중파', C: '자유 영혼' } },
    { num: '08', label: 'POLITICS', metaByValue: { A: '무관심', B: '중도', C: '확고' } },
    { num: '09', label: 'RELIGION', metaByValue: { A: '관용', B: '조건부', C: '독실' } },
    { num: '10', label: 'FINANCE', metaByValue: { A: '경험 소비형', B: '밸런스형', C: '짠테크형' } },
    { num: '11', label: 'CONFLICT', metaByValue: { A: '냉각기', B: '즉시 해결', C: '평화주의' } },
    { num: '12', label: 'ENERGY', metaByValue: { A: '아웃도어', B: '하이브리드', C: '집순이/집돌이' } },
  ];

  function computeTier(score) {
    if (score >= 28) return {
      name: 'ALPHA', short: 'A', grade: 'S+', shortFontSize: 36,
      color: '#FF1F8F', stroke: '#FF1F8F', bgFill: 'rgba(255,31,143,0.14)', glowBg: 'rgba(255,31,143,0.24)',
      pct: '상위 1%', tagline: '연애 시장의 포식자',
      factbomb: '외모·능력·피지컬 모든 면에서 연애 시장의 포식자. 자정 넘어 선톡해도 칼답 받는 종족. 본인이 갑인 걸 이미 알고 있을 확률 100%.',
    };
    if (score >= 22) return {
      name: 'BETA+', short: 'B+', grade: 'S', shortFontSize: 26,
      color: '#5AF0FF', stroke: '#00E5FF', bgFill: 'rgba(0,229,255,0.10)', glowBg: 'rgba(0,229,255,0.18)',
      pct: '상위 15%', tagline: '육각형에 가장 가까운 알짜',
      factbomb: '훈훈한 외모 또는 확실한 경제력 중 최소 하나는 가진 알짜배기. 결혼 시장에서 프리패스에 가장 가까운 매물.',
    };
    if (score >= 16) return {
      name: 'BETA', short: 'B', grade: 'A', shortFontSize: 36,
      color: '#93F0D6', stroke: '#6FE7C8', bgFill: 'rgba(111,231,200,0.10)', glowBg: 'rgba(111,231,200,0.18)',
      pct: '상위 40%', tagline: '대한민국 연애 시장의 허리',
      factbomb: '무난하고 깔끔한 평균 이상. 든든하지만 먼저 대시하지 않으면 은근히 연애 빡센 구간. 적극성 한 끗 차이.',
    };
    if (score >= 10) return {
      name: 'GAMMA', short: 'G', grade: 'B', shortFontSize: 36,
      color: '#FFE07A', stroke: '#FFD43A', bgFill: 'rgba(255,212,58,0.10)', glowBg: 'rgba(255,212,58,0.18)',
      pct: '상위 70%', tagline: '매력 자본 투자 시급',
      factbomb: '"착하긴 한데..." 소리를 주로 듣는 멸종 위기의 초식남/건어물녀. 외모·커리어·라이프스타일 중 하나에 즉시 투자 필요.',
    };
    return {
      name: 'OMEGA', short: 'Ω', grade: 'C', shortFontSize: 34,
      color: '#DCE3EE', stroke: '#C7D2E0', bgFill: 'rgba(199,210,224,0.08)', glowBg: 'rgba(199,210,224,0.14)',
      pct: '하위 30%', tagline: '눈높이 재조정 필요',
      factbomb: '현생(업무/학업)에 올인하느라 연애 세포가 완전히 박살 난 상태. 눈을 대기권 밑으로 낮추거나, 본질을 다시 세팅할 시간.',
    };
  }

  let answers = new Array(12).fill(null);
  try {
    const raw = localStorage.getItem('tier:result');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.answers) && parsed.answers.length === 12) {
        answers = parsed.answers;
      }
    }
  } catch (e) {}

  const totalScore = answers.slice(0, 6).reduce((s, a) => s + (a && typeof a.value === 'number' ? a.value : 0), 0);
  const tier = computeTier(totalScore);
  const matchCount = ((totalScore * 41 + 137) % 520) + 80;

  const $ = (id) => document.getElementById(id);

  $('total-score').textContent = totalScore;
  $('breakdown-meta').textContent = totalScore + ' / 34';
  $('match-count').textContent = '약 ' + matchCount + '명';

  const card = $('tier-card');
  card.style.background = 'linear-gradient(180deg, ' + tier.bgFill + ', rgba(255,255,255,0.01))';
  card.style.border = '1px solid ' + tier.stroke;
  card.style.boxShadow = '0 24px 60px -24px ' + tier.stroke;
  $('tier-glow').style.background = 'radial-gradient(60% 40% at 50% 0%, ' + tier.glowBg + ', transparent 70%)';

  $('tier-badge').innerHTML =
    '<svg viewBox="0 0 88 100" width="92" height="104">' +
      '<polygon points="44,6 80,24 80,64 44,82 8,64 8,24" fill="' + tier.bgFill + '" stroke="' + tier.stroke + '" stroke-width="2"/>' +
      '<polygon points="44,14 72,28 72,60 44,74 16,60 16,28" fill="none" stroke="' + tier.color + '" stroke-opacity="0.6" stroke-width="0.85"/>' +
      '<text x="44" y="58" font-family="Pretendard" font-size="' + tier.shortFontSize + '" font-weight="900" text-anchor="middle" fill="' + tier.color + '">' + tier.short + '</text>' +
    '</svg>';

  $('tier-grade').textContent = 'YOUR TIER · ' + tier.grade;
  $('tier-name').textContent = tier.name;
  $('tier-name').style.color = tier.color;
  $('tier-tagline').textContent = tier.pct + ' · ' + tier.tagline;
  $('tier-factbomb').textContent = tier.factbomb;

  const breakdown = $('breakdown');
  META.slice(0, 6).forEach((m, i) => {
    const ans = answers[i];
    const score = ans && typeof ans.value === 'number' ? ans.value : 0;
    const pct = m.maxScore > 0 ? (score / m.maxScore) * 100 : 0;
    const row = document.createElement('div');
    row.style.cssText = 'display: flex; align-items: center; gap: 12px; padding: 11px 14px; border-radius: 10px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06);';
    row.innerHTML =
      '<span style="font-size: 10px; font-weight: 800; color: #FF1F8F; letter-spacing: 0.14em; min-width: 18px;">' + m.num + '</span>' +
      '<span style="flex: 1; font-size: 13.5px; font-weight: 700; color: #fff;">' + m.label + '</span>' +
      '<div style="width: 70px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden;">' +
        '<div style="height: 100%; background: #FF1F8F; width: ' + pct + '%; border-radius: 999px; transition: width 600ms ease;"></div>' +
      '</div>' +
      '<span style="font-size: 12px; font-weight: 800; color: #fff; min-width: 34px; text-align: right;">' + score + '/' + m.maxScore + '</span>';
    breakdown.appendChild(row);
  });

  const chips = $('internal-chips');
  META.slice(6, 12).forEach((m, i) => {
    const ans = answers[i + 6];
    const value = ans ? ans.value : null;
    const metaLabel = (value && m.metaByValue && m.metaByValue[value]) ? m.metaByValue[value] : '—';
    const typeLabel = value ? ('Type ' + value) : '—';
    const chip = document.createElement('div');
    chip.style.cssText = 'padding: 12px; border-radius: 10px; background: rgba(255,234,0,0.04); border: 1px solid rgba(255,234,0,0.15);';
    chip.innerHTML =
      '<div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px;">' +
        '<span style="font-size: 9.5px; font-weight: 800; color: #FFEA00; letter-spacing: 0.14em;">' + m.num + ' · ' + m.label + '</span>' +
        '<span style="font-size: 9.5px; font-weight: 700; color: rgba(255,255,255,0.35);">' + typeLabel + '</span>' +
      '</div>' +
      '<div style="font-size: 14px; font-weight: 800; color: #fff; letter-spacing: -0.01em; line-height: 1.3;">' + metaLabel + '</div>';
    chips.appendChild(chip);
  });
})();
</script>
</body>
</html>
